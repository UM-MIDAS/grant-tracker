name: Grants.gov Daily Monitor

on:
  schedule:
    # Runs every weekday at 8:00 AM Eastern (12:00 UTC)
    - cron: "0 12 * * 1-5"
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit the updated CSV back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run grants monitor
        env:
          GRANTS_API_KEY: ${{ secrets.GRANTS_API_KEY }}
          SLACK_WEBHOOK:  ${{ secrets.SLACK_WEBHOOK }}
        run: python search_grants.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/opportunities.csv
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update opportunities CSV [$(date +'%Y-%m-%d')]"
          git push
