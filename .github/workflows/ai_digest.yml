name: AI & Data Science Digest

on:
  schedule:
    # Runs every Monday at 9:00 AM Eastern (13:00 UTC)
    - cron: "0 13 * * 1"
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Generate AI digest
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python generate_ai_digest.py

      - name: Commit digest HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ai-digest.html
          git stash --include-untracked
          git pull --rebase
          git stash pop
          git add docs/ai-digest.html
          git diff --cached --quiet || git commit -m "chore: update AI digest [$(date +'%Y-%m-%d')]"
          git push
