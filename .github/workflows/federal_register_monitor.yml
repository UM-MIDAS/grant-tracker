name: Federal Register Daily Monitor

on:
  schedule:
    # Runs every weekday at 8:30 AM Eastern (12:30 UTC)
    # Offset by 30 minutes from Grants.gov monitor to avoid overlap
    - cron: "30 12 * * 1-5"
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit the updated CSV back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run Federal Register monitor
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python search_federal_register.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/federal_register.csv || true
          git diff --cached --quiet || git commit -m "chore: update Federal Register CSV [$(date +'%Y-%m-%d')]"
          git push || true
