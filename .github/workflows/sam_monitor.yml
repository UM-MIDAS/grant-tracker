name: SAM.gov Daily Monitor

on:
  schedule:
    # Runs every weekday at 8:15 AM Eastern (12:15 UTC)
    # Offset by 15 minutes from the Grants.gov monitor to avoid overlap
    - cron: "15 12 * * 1-5"
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit the updated CSV back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run SAM.gov monitor
        env:
          SAM_API_KEY:   ${{ secrets.SAM_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python search_sam.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sam_opportunities.csv
          git stash
          git pull --rebase origin main
          git stash pop
          git add data/sam_opportunities.csv
          git diff --cached --quiet || git commit -m "chore: update SAM opportunities CSV [$(date +'%Y-%m-%d')]"
          git push origin main
