name: Challenges Daily Monitor

on:
  schedule:
    - cron: "45 12 * * 1-5"
  workflow_dispatch:

jobs:
  usagov-challenges:
    name: USA.gov Challenges
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4

      - name: Run USA.gov challenges monitor
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python search_usagov_challenges.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/usagov_challenges.csv || true
          git stash || true
          git pull --rebase
          git stash pop || true
          git diff --cached --quiet || git commit -m "chore: update USA.gov challenges CSV [$(date +'%Y-%m-%d')]"
          git push || true

  nih-challenges:
    name: NIH Challenges
    runs-on: ubuntu-latest
    needs: usagov-challenges
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4

      - name: Run NIH challenges monitor
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python search_nih_challenges.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nih_challenges.csv || true
          git stash || true
          git pull --rebase
          git stash pop || true
          git diff --cached --quiet || git commit -m "chore: update NIH challenges CSV [$(date +'%Y-%m-%d')]"
          git push || true
