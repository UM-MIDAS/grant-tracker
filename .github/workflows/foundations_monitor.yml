name: Foundations Monitor

on:
  schedule:
    # Runs every weekday at 9:15 AM Eastern (13:15 UTC)
    # Offset by 15 minutes from the industry grants monitor to avoid overlap
    - cron: "15 13 * * 1-5"
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4

      - name: Run foundations monitor
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python search_foundations.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/foundations.csv || true
          git stash || true
          git pull --rebase
          git stash pop || true
          git add data/foundations.csv || true
          git diff --cached --quiet || git commit -m "chore: update foundations CSV [$(date +'%Y-%m-%d')]"
          git push || true
